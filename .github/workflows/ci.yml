name: CI

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Show version
        run: |
          echo "version: $(grep '^version' Cargo.toml | head -1 | awk '{print $3}' | tr -d '"')"

      - name: Show target platform
        run: |
          echo "target: $(rustc -vV | grep '^host:' | awk '{print $2}')"

      - name: Run unit tests
        run: cargo test -- --nocapture

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TARGET=$(rustc -vV | grep host | sed 's/.*: //')
          cargo build --release
          mkdir -p build
          BIN="build/fy-${VERSION}-${TARGET}"
          cp target/release/fy "${BIN}"
          ln -sf "fy-${VERSION}-${TARGET}" build/fy
          echo "Binary: ${BIN}"

          # musl static build
          rustup target add x86_64-unknown-linux-musl
          cargo build --release --target x86_64-unknown-linux-musl
          MUSL_BIN="build/fy-${VERSION}-x86_64-unknown-linux-musl"
          cp target/x86_64-unknown-linux-musl/release/fy "${MUSL_BIN}"
          echo "Binary (musl): ${MUSL_BIN}"

      - name: Run integration tests
        run: make check

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/fy-*
