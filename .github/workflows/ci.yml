name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Show version
        run: grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/'

      - name: Show target platform
        run: rustc -vV | grep host | sed 's/.*: //'

      - name: Run unit tests
        run: cargo test -- --nocapture

      - name: Build release
        run: |
          cargo build --release
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TARGET=$(rustc -vV | grep host | sed 's/.*: //')
          echo "Building fy ${VERSION} for ${TARGET}"
          mkdir -p build
          cp target/release/fy "build/fy-${VERSION}-${TARGET}"
          ln -sf "fy-${VERSION}-${TARGET}" build/fy
          echo "Binary: build/fy-${VERSION}-${TARGET}"

      - name: Run integration tests
        run: make check
